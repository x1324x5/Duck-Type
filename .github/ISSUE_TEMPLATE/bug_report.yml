name: 🐛 Bug 反馈
description: 报告一个问题
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: 问题描述
      description: 发生了什么？期望的行为是什么？
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
      placeholder: |
        1. ...
        2. ...
        3. 出现 ...
  - type: input
    id: version
    attributes:
      label: DuckType 版本
      placeholder: 如 v0.1.0 / commit hash
  - type: input
    id: windows
    attributes:
      label: Windows 版本
      placeholder: 如 Windows 11 23H2
  - type: input
    id: ime
    attributes:
      label: 输入法
      placeholder: 如 微软拼音 / 搜狗 / 其它
  - type: textarea
    id: logs
    attributes:
      label: 日志
      description: 可粘贴 `%APPDATA%\DuckType\ducktype.log` 的相关片段。
      render: text
