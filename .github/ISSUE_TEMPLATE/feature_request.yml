name: 💡 功能建议
description: 提出一个新功能或改进
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: 你希望增加什么？
      description: 描述这个功能解决的问题或带来的价值。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其它做法（可选）。
